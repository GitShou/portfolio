AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ポートフォリオサイトのバックエンド（API/Lambda/DynamoDB/SSM）のSAMテンプレート

Parameters:
  ProjectName:
    Type: String
    Description: プロジェクト名（リソース名のプレフィックス）
    Default: "portfolio5352"
  ApiStageName:
    Type: String
    Description: API Gateway のステージ名
    Default: "prod"
  ParameterWriterFunctionArnParameter:
    Type: 'AWS::SSM::Parameter::Value<String>'
    Description: SSMパラメータストアに格納されたParameterWriterFunctionのARN
    Default: "/portfolio/SSM/parameter-writer/function-arn"

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    Tags:
      project: !Ref ProjectName
    Environment:
      Variables:
        PROJECT_TABLE_NAME: !Ref ProjectTable

Resources:
  ProjectTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-projects-v1"
      AttributeDefinitions:
        - AttributeName: EntityPartitionKey
          AttributeType: S
        - AttributeName: EntitySortKey
          AttributeType: S
        - AttributeName: PortfolioIndexPartitionKey
          AttributeType: S
        - AttributeName: PortfolioIndexSortKey
          AttributeType: S
        - AttributeName: ProjectTypeIndexPartitionKey
          AttributeType: S
        - AttributeName: ProjectTypeIndexSortKey
          AttributeType: S
      KeySchema:
        - AttributeName: EntityPartitionKey
          KeyType: HASH
        - AttributeName: EntitySortKey
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: PortfolioIndexPartitionKey
              KeyType: HASH
            - AttributeName: PortfolioIndexSortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: ProjectTypeIndexPartitionKey
              KeyType: HASH
            - AttributeName: ProjectTypeIndexSortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: project
          Value: !Ref ProjectName

  ProjectTableNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ProjectName}/dynamodb/project-table-name"
      Type: String
      Value: !Ref ProjectTable
      Description: !Sub "${ProjectName} DynamoDB projects table name"
      Tags:
        project: !Ref ProjectName

  BeaconLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-beacon-logs"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteBeaconLogsAfter30Days
            Status: Enabled
            ExpirationInDays: 30
            Prefix: events/
      Tags:
        - Key: project
          Value: !Ref ProjectName

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${ProjectName}/${ApiStageName}"
      RetentionInDays: 14
      Tags:
        - Key: project
          Value: !Ref ProjectName

  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-apigw-cloudwatch-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayCloudWatchLogging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apigateway/*"
      Tags:
        - Key: project
          Value: !Ref ProjectName

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaDynamoDBPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ProjectTable.Arn
                  - !Sub "${ProjectTable.Arn}/index/*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: project
          Value: !Ref ProjectName

  TrackingLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-tracking-lambda-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TrackPageViewS3PutPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${BeaconLogBucket.Arn}/*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: project
          Value: !Ref ProjectName

  BeaconPageViewApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/${ProjectName}/edge/beacon/api-key/secret"
      Description: !Sub "${ProjectName} beacon page-view API key source secret"
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 48
      Tags:
        - Key: project
          Value: !Ref ProjectName

  BeaconPageViewApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub "${ProjectName}-beacon-page-view-api-key"
      Description: !Sub "${ProjectName} beacon page-view API key"
      Enabled: true
      Value: !Sub "{{resolve:secretsmanager:${BeaconPageViewApiKeySecret}:SecretString}}"
      Tags:
        - Key: project
          Value: !Ref ProjectName

  BeaconPageViewUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - ProjectApiStage
    Properties:
      UsagePlanName: !Sub "${ProjectName}-beacon-page-view-usage-plan"
      Description: !Sub "${ProjectName} usage plan for beacon page-view endpoint"
      ApiStages:
        - ApiId: !Ref ProjectApi
          Stage: !Ref ApiStageName
      Tags:
        - Key: project
          Value: !Ref ProjectName

  BeaconPageViewUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref BeaconPageViewApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref BeaconPageViewUsagePlan

  ProjectApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref ApiStageName
      Auth:
        DefaultAuthorizer: AWS_IAM
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      Tags:
        project: !Ref ProjectName

  ParameterWriterWrapperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-parameter-writer-wrapper"
      CodeUri: ../Lambda/src/parameter-writer-wrapper/
      Handler: index.handler
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          PARAMETER_WRITER_FUNCTION_ARN: !Ref ParameterWriterFunctionArnParameter
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Ref ParameterWriterFunctionArnParameter
            - Effect: Allow
              Action:
                - cloudformation:DescribeStackResource
              Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*"
      Tags:
        project: !Ref ProjectName

  BeaconApiKeySecureParameterWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-beacon-api-key-ssm-writer"
      CodeUri: ../Lambda/src/beacon-api-key-ssm-writer/
      Handler: index.handler
      MemorySize: 128
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:PutParameter
                - ssm:DeleteParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/edge/beacon/api-key"
      Tags:
        project: !Ref ProjectName

  BeaconApiKeySecureParameterCustomResource:
    Type: Custom::BeaconApiKeySecureParameter
    DependsOn:
      - BeaconPageViewApiKeySecret
      - BeaconApiKeySecureParameterWriterFunction
    Properties:
      ServiceToken: !GetAtt BeaconApiKeySecureParameterWriterFunction.Arn
      Name: !Sub "/${ProjectName}/edge/beacon/api-key"
      Value: !Sub "{{resolve:secretsmanager:${BeaconPageViewApiKeySecret}:SecretString}}"

  ParameterWriterCustomResource:
    Type: Custom::ParameterWriter
    DependsOn:
      - ProjectApi
    Properties:
      ServiceToken: !GetAtt ParameterWriterWrapperFunction.Arn
      Parameters:
        - name: !Sub "/${ProjectName}/api/base-url"
          valueFrom:
            type: apiGatewayBaseUrl
            logicalId: ProjectApi
            stage: !Ref ApiStageName
          type: String
        - name: !Sub "/${ProjectName}/edge/api-origin-base-url"
          valueFrom:
            type: apiGatewayBaseUrl
            logicalId: ProjectApi
            stage: !Ref ApiStageName
          type: String

  GetProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/get-projects/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetProjects:
          Type: Api
          Properties:
            Path: /projects
            Method: get
            RestApiId: !Ref ProjectApi

  CreateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/create-project/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        CreateProject:
          Type: Api
          Properties:
            Path: /projects
            Method: post
            RestApiId: !Ref ProjectApi

  GetProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/get-project/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetProject:
          Type: Api
          Properties:
            Path: /projects/{id}
            Method: get
            RestApiId: !Ref ProjectApi

  UpdateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/update-project/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        UpdateProject:
          Type: Api
          Properties:
            Path: /projects/{id}
            Method: put
            RestApiId: !Ref ProjectApi

  DeleteProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/delete-project/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        DeleteProject:
          Type: Api
          Properties:
            Path: /projects/{id}
            Method: delete
            RestApiId: !Ref ProjectApi

  TrackPageViewFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../Lambda/src/track-page-view/
      Handler: index.handler
      Role: !GetAtt TrackingLambdaExecutionRole.Arn
      Environment:
        Variables:
          BEACON_LOG_BUCKET_NAME: !Ref BeaconLogBucket
          BEACON_LOG_PREFIX: "events/"
      Events:
        TrackPageViewPost:
          Type: Api
          Properties:
            Path: /events/page-view
            Method: post
            RestApiId: !Ref ProjectApi
            Auth:
              Authorizer: NONE
              ApiKeyRequired: true
        TrackPageViewOptions:
          Type: Api
          Properties:
            Path: /events/page-view
            Method: options
            RestApiId: !Ref ProjectApi
            Auth:
              Authorizer: NONE

  BeaconAthenaResultBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-beacon-athena-results"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteResultsAfter30Days
            Status: Enabled
            ExpirationInDays: 30
            Prefix: beacon/
      Tags:
        - Key: project
          Value: !Ref ProjectName

  BeaconAthenaResultBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BeaconAthenaResultBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAthenaAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
            Resource:
              - !Sub "${BeaconAthenaResultBucket.Arn}"
              - !Sub "${BeaconAthenaResultBucket.Arn}/*"

  BeaconLogsDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${ProjectName}_beacon_logs"
        Description: Beacon イベントログ分析用の Glue データベース

  BeaconLogsRawTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref BeaconLogsDatabase
      TableInput:
        Name: beacon_page_views_raw
        Description: S3 に保存されたページビューイベントログ(JSON)
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          typeOfData: file
          projection.enabled: "true"
          projection.dt.type: date
          projection.dt.format: yyyy-MM-dd
          projection.dt.range: "2025-01-01,NOW"
          projection.dt.interval: "1"
          projection.dt.interval.unit: DAYS
          projection.hour.type: integer
          projection.hour.range: "0,23"
          projection.hour.digits: "2"
          storage.location.template: !Sub "s3://${BeaconLogBucket}/events/dt=${!dt}/hour=${!hour}/"
        PartitionKeys:
          - { Name: dt, Type: string }
          - { Name: hour, Type: string }
        StorageDescriptor:
          Columns:
            - { Name: event_type, Type: string }
            - { Name: to_path, Type: string }
            - { Name: from_path, Type: string }
            - { Name: tracked, Type: boolean }
            - { Name: source_ip, Type: string }
            - { Name: user_agent, Type: string }
            - { Name: referrer, Type: string }
            - { Name: request_id, Type: string }
            - { Name: timestamp, Type: string }
            - { Name: received_at, Type: string }
          Location: !Sub "s3://${BeaconLogBucket}/events/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          Compressed: false
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              mapping.event_type: eventType
              mapping.to_path: toPath
              mapping.from_path: fromPath
              mapping.source_ip: sourceIp
              mapping.user_agent: userAgent
              mapping.request_id: requestId
              mapping.received_at: receivedAt
          StoredAsSubDirectories: false

  BeaconAthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ProjectName}-beacon-workgroup"
      Description: Beacon イベントログ分析用 WorkGroup
      RecursiveDeleteOption: true
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: false
        ResultConfiguration:
          OutputLocation: !Sub "s3://${BeaconAthenaResultBucket}/beacon/"
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  BeaconProjectPagesSummaryNamedQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub "${ProjectName}-beacon-project-pages-summary"
      Description: 直近30日 beacon ログをパーティション絞り込みで集計（サブネット x UA）
      Database: !Ref BeaconLogsDatabase
      WorkGroup: !Ref BeaconAthenaWorkGroup
      QueryString: |
        WITH filtered AS (
            SELECT
                CASE
                    WHEN regexp_like(source_ip, '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
                        THEN CONCAT(
                            split_part(source_ip, '.', 1), '.',
                            split_part(source_ip, '.', 2), '.',
                            split_part(source_ip, '.', 3), '.0/24'
                        )
                    ELSE 'non-ipv4'
                END AS ip_subnet,
                source_ip,
                user_agent,
                to_path,
                try(from_iso8601_timestamp(timestamp)) AS event_ts
            FROM beacon_page_views_raw b
            WHERE b.event_type = 'page_view'
              AND b.tracked = true
              AND b.to_path LIKE '/projects/%'
              AND b.dt BETWEEN date_format(date_add('day', -29, current_date), '%Y-%m-%d')
                          AND date_format(current_date, '%Y-%m-%d')
        )
        SELECT
            ip_subnet,
            COUNT(*) AS req_cnt,
            date_format(min(event_ts AT TIME ZONE 'Asia/Tokyo'), '%m月%d日 %H:%i') AS first_access,
            array_join(
                slice(array_sort(array_distinct(array_agg(to_path))), 1, 50),
                ', '
            ) AS projects_pages,
            date_diff(
                'minute',
                min(event_ts AT TIME ZONE 'Asia/Tokyo'),
                max(event_ts AT TIME ZONE 'Asia/Tokyo')
            ) AS duration,
            COUNT(DISTINCT source_ip) AS unique_ips,
            CASE
                WHEN user_agent LIKE '%Chrome%' THEN 'Chrome'
                WHEN user_agent LIKE '%Firefox%' THEN 'Firefox'
                WHEN user_agent LIKE '%Safari%' AND user_agent NOT LIKE '%Chrome%' THEN 'Safari'
                WHEN user_agent LIKE '%Edge%' THEN 'Edge'
                WHEN lower(user_agent) LIKE '%bot%' OR lower(user_agent) LIKE '%crawler%' THEN 'Bot/Crawler'
                ELSE 'Other'
            END AS browser,
            user_agent AS agent
        FROM filtered
        WHERE event_ts IS NOT NULL
          AND event_ts >= current_timestamp - INTERVAL '30' DAY
        GROUP BY ip_subnet, user_agent
        HAVING COUNT(*) >= 10
        ORDER BY min(event_ts) DESC

  BeaconProjectPageEventsNamedQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub "${ProjectName}-beacon-project-page-events"
      Description: 直近30日間のプロジェクトページ遷移イベント一覧（パーティション絞り込み）
      Database: !Ref BeaconLogsDatabase
      WorkGroup: !Ref BeaconAthenaWorkGroup
      QueryString: |
        WITH filtered AS (
            SELECT
                try(from_iso8601_timestamp(b.timestamp)) AS event_ts,
                b.to_path,
                b.from_path,
                b.tracked,
                b.source_ip,
                b.user_agent,
                b.referrer,
                b.request_id
            FROM beacon_page_views_raw b
            WHERE b.event_type = 'page_view'
              AND b.to_path LIKE '/projects/%'
              AND b.dt BETWEEN date_format(date_add('day', -29, current_date), '%Y-%m-%d')
                          AND date_format(current_date, '%Y-%m-%d')
        )
        SELECT
            event_ts AT TIME ZONE 'Asia/Tokyo' AS event_time_jst,
            to_path,
            from_path,
            tracked,
            source_ip,
            user_agent,
            referrer,
            request_id
        FROM filtered
        WHERE event_ts IS NOT NULL
          AND event_ts >= current_timestamp - INTERVAL '30' DAY
        ORDER BY event_time_jst DESC
        LIMIT 1000

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${ProjectApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
    Description: API Gatewayエンドポイント
  PageViewEndpoint:
    Value: !Sub "https://${ProjectApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/events/page-view"
    Description: ページビューイベント送信エンドポイント
  BeaconLogBucketName:
    Value: !Ref BeaconLogBucket
    Description: ページビューイベントログ保存用S3バケット名
  BeaconLogsDatabaseName:
    Value: !Ref BeaconLogsDatabase
    Description: Beacon イベントログ分析用のGlue Database名
  BeaconLogsRawTableName:
    Value: beacon_page_views_raw
    Description: Beacon イベントログ分析用のGlue Table名
  BeaconAthenaWorkGroupName:
    Value: !Ref BeaconAthenaWorkGroup
    Description: Beacon イベントログ分析用Athena WorkGroup名
  BeaconAthenaResultBucketName:
    Value: !Ref BeaconAthenaResultBucket
    Description: Beacon イベントログ分析用Athena結果バケット名
  BeaconProjectPagesSummaryNamedQueryId:
    Value: !Ref BeaconProjectPagesSummaryNamedQuery
    Description: プロジェクトページ集計用のAthena Named Query ID
  BeaconProjectPageEventsNamedQueryId:
    Value: !Ref BeaconProjectPageEventsNamedQuery
    Description: プロジェクトページ遷移一覧用のAthena Named Query ID
  DynamoDBTableName:
    Value: !Ref ProjectTable
    Description: プロジェクト情報用DynamoDBテーブル名
